name: Build executable (.exe)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r event_meeting_manager/requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      working-directory: ./event_meeting_manager
      run: |
        python -m PyInstaller --onefile --noconsole --add-data "database/schema.sql;database" main.py

    - name: Upload built executable as artifact
      uses: actions/upload-artifact@v4
      with:
        name: YuuMeet-Windows
        path: event_meeting_manager/dist/main.exe

    - name: Upload executable to GitHub Release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: event_meeting_manager/dist/main.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
